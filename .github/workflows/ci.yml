name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: takeat_orders
          POSTGRES_USER: takeat_app
          POSTGRES_PASSWORD: takeat123
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U takeat_app -d takeat_orders"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20

    env:
      PORT: 3001
      APP_HOST: localhost
      DB_HOST: localhost
      DB_PORT: 5432
      DB_NAME: takeat_orders
      DB_USER: takeat_app
      DB_PASSWORD: takeat123

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: npm ci --prefix backend

      - name: Run backend tests
        run: npm --prefix backend test

  frontend-quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Run frontend lint
        run: npm --prefix frontend run lint

      - name: Run frontend build
        run: npm --prefix frontend run build
